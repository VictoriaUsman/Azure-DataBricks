version: 2

sources:
  - name: retail_platform
    database: retail_platform
    schema: retail_platform
    description: "Silver layer tables produced by notebooks 01 and 02"

    freshness:
      warn_after:  {count: 1, period: day}
      error_after: {count: 3, period: day}

    tables:
      - name: silver_transactions
        loaded_at_field: _ingested_at
        description: "Cleaned, deduplicated transactions from Bronze"
        columns:
          - name: transaction_id
            tests: [not_null, unique]
          - name: customer_id
            tests: [not_null]
          - name: product_id
            tests: [not_null]
          - name: store_id
            tests: [not_null]

      - name: silver_customers
        description: "Cleaned customer master"
        columns:
          - name: customer_id
            tests: [not_null, unique]

      - name: silver_products
        description: "Cleaned product catalogue"
        columns:
          - name: product_id
            tests: [not_null, unique]

      - name: silver_stores
        description: "Cleaned store directory"
        columns:
          - name: store_id
            tests: [not_null, unique]
